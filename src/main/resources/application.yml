opensearch:
  host: localhost
  port: 9200
  scheme: http

minio:
  url: http://localhost:9000
  access-key: minio_admin
  secret-key: minio_admin_password

spring:
  mail:
    host: ${MAIL_HOST:sandbox.smtp.mailtrap.io}
    port: ${MAIL_PORT:2525}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  datasource:
    url: jdbc:postgresql://localhost:5433/socialapp
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  flyway:
    schemas: socialapp
    default-schema: socialapp
    validate-on-migrate: false

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        default_schema: socialapp

  data:
    redis:
      host: localhost
      port: 6379

  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: neo4j_password

cache:
  default-ttl: 30m
  jitter-percent: 10
  lock-ttl: 5s
  lock-retry-delay: 100ms
  lock-max-retries: 50

moderation:
  enabled: false
  perspective-api:
    key: ${PERSPECTIVE_API_KEY:}
    toxicity-threshold: 0.7
    review-threshold: 0.5
  cloud-vision:
    credentials-path: ${GOOGLE_APPLICATION_CREDENTIALS:}
    reject-likelihood: VERY_LIKELY
    review-likelihood: POSSIBLE
  rules:
    keyword-blacklist-path: classpath:moderation/blacklist.txt
    max-urls-per-post: 3
    duplicate-window-seconds: 60

jwt:
  secret: ${JWT_SECRET:defaultSecretKeyThatShouldBeChangedInProduction12345}
  access-token-expiration-ms: 900000
  refresh-token-expiration-ms: 604800000

auth:
  reset-password-url: ${RESET_PASSWORD_URL:http://localhost:3000/forgot-password?token=}

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: gemini-3.5-flash
  base-url: https://generativelanguage.googleapis.com/v1beta
  max-output-tokens: 8192
  temperature: 0.7

trending:
  crawl-interval-ms: 3600000

onesignal:
  app-id: ${ONESIGNAL_APP_ID:}
  rest-api-key: ${ONESIGNAL_REST_API_KEY:}

mailtrap:
  host: ${MAIL_HOST:sandbox.smtp.mailtrap.io}
  port: ${MAIL_PORT:2525}
  username: ${MAIL_USERNAME:}
  password: ${MAIL_PASSWORD:}
  from-email: noreply@socialapp.dev
  from-name: SocialApp

google:
  calendar:
    client-id: ${GOOGLE_CALENDAR_CLIENT_ID:}
    client-secret: ${GOOGLE_CALENDAR_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_CALENDAR_REDIRECT_URI:http://localhost:8080/v1/api/events/google/callback}

vnpay:
  tmn-code: ${VNPAY_TMN_CODE:DEMO1234}
  hash-secret: ${VNPAY_HASH_SECRET:DEMOSECRETKEY}
  pay-url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
  return-url: ${VNPAY_RETURN_URL:http://localhost:3000/payment/callback}
  api-url: https://sandbox.vnpayment.vn/merchant_webapi/api/transaction
