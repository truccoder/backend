opensearch:
  host: localhost
  port: 9200
  scheme: http

minio:
  url: http://localhost:9000
  access-key: minio_admin
  secret-key: minio_admin_password

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/socialapp
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  flyway:
    schemas: socialapp
    default-schema: socialapp

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        default_schema: socialapp

  data:
    redis:
      host: localhost
      port: 6379

  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: neo4j_password

cache:
  default-ttl: 30m
  jitter-percent: 10
  lock-ttl: 5s
  lock-retry-delay: 100ms
  lock-max-retries: 50

moderation:
  enabled: true
  perspective-api:
    key: ${PERSPECTIVE_API_KEY:}
    toxicity-threshold: 0.7
    review-threshold: 0.5
  cloud-vision:
    credentials-path: ${GOOGLE_APPLICATION_CREDENTIALS:}
    reject-likelihood: VERY_LIKELY
    review-likelihood: POSSIBLE
  rules:
    keyword-blacklist-path: classpath:moderation/blacklist.txt
    max-urls-per-post: 3
    duplicate-window-seconds: 60