opensearch:
  host: localhost
  port: 9200
  scheme: http

minio:
  url: http://localhost:9000
  access-key: minio_admin
  secret-key: minio_admin_password

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/socialapp
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  flyway:
    # Schema that Flyway will manage and create its history table in
    schemas: socialapp
    default-schema: socialapp

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        default_schema: socialapp